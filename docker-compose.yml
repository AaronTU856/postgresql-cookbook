services:
  postgres:
    image: postgres:16
    container_name: postgresql-cookbook-db
    restart: unless-stopped
    environment:
      # Values can be overridden in a local .env file.
      POSTGRES_DB: ${POSTGRES_DB:-postgresql_cookbook}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # Keep database data between container restarts.
      - postgres-data:/var/lib/postgresql/data
      # Load schema and seed data automatically when the volume is first created.
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database:/database:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgresql_cookbook}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
